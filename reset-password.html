<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirWatch — Reset Password</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.06;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.08; }
      90%  { opacity: 0.08; }
      100% { transform: translateY(-20px) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>

  <main class="login-page">
    <div class="login-hero">
      <div class="login-logo">🔐</div>
      <h1 class="login-title">Reset Password</h1>
      <p class="login-subtitle">Enter your new secure password below.</p>
    </div>

    <div class="login-cards" style="justify-content: center; display: flex;">
      <div class="login-card" style="--card-gradient: linear-gradient(90deg,#4e9af1,#00c48c); max-width: 400px; width: 100%;">
        <div class="login-card-icon" style="background:rgba(78,154,241,0.18)">🔄</div>
        <div class="login-card-title">Update Credentials</div>
        
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input id="new-password" class="form-input" type="password" />
        </div>
        
        <p id="reset-error" class="err-msg" style="display: none;"></p>
        <p id="reset-success" style="display: none; color: #00c48c; font-size: 0.9rem; margin-bottom: 10px; font-weight: bold;"></p>
        
        <button class="btn-login" onclick="submitNewPassword()"
          style="background:linear-gradient(135deg,#4e9af1,#00c48c); color:#fff">
          Confirm Update
        </button>
        
        <button class="btn-login" onclick="window.location.href='index.html'"
          style="background:transparent; border: 1px solid #4e9af1; color:#4e9af1; margin-top: 10px;">
          Back to Login
        </button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ---- Paste your exact Supabase details here ----
    const SUPABASE_URL = 'https://twolhlkigplkhnqcfftx.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3b2xobGtpZ3Bsa2hucWNmZnR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDc3MzEsImV4cCI6MjA5NTM4MzczMX0.zU8sZiUydaCWYDiuPu7dw-vOnFzggSbRA8cI1DOzBCk'; 

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function submitNewPassword() {
      const passEl = document.getElementById('new-password');
      const errEl = document.getElementById('reset-error');
      const succEl = document.getElementById('reset-success');
      const newPassword = passEl.value;

      errEl.style.display = 'none';
      succEl.style.display = 'none';

      if (!newPassword || newPassword.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters long.';
        errEl.style.display = 'block';
        return;
      }

      try {
        const { error } = await supabaseClient.auth.updateUser({
          password: newPassword
        });

        if (error) throw error;

        succEl.textContent = 'Password successfully updated!';
        succEl.style.display = 'block';
        passEl.value = ''; 

      } catch (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
      }
    }

    // Particle background execution
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 80 + 20;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        background: ${['#4e9af1','#00c48c'][Math.floor(Math.random()*2)]};
        animation-duration: ${Math.random()*20+15}s;
        animation-delay: ${Math.random()*15}s;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
